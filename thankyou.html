<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0d1117;
      color: #ffffff;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      background: #161b22;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.45);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 32px;
    }

    p {
      font-size: 18px;
      opacity: 0.85;
      margin-bottom: 20px;
    }

    a {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #ffffff;
      color: #000;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Thank You!</h1>
    <p>Your message has been sent successfully.</p>
    <a href="index.html">Back to Home</a>
  </div>
</body>
</html>
